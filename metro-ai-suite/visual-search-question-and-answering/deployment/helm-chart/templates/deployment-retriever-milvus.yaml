apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retrieverMilvus.fullname" . }}
  labels:
    app: {{ include "retrieverMilvus.name" . }}
spec:
  replicas: {{ .Values.retrieverMilvus.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.retrieverMilvus.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.retrieverMilvus.name }}
    spec:
      hostIPC: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: {{ .Values.retrieverMilvus.name }}
        image: "{{ if .Values.global.registry }}{{ .Values.global.registry }}{{ end }}{{ .Values.retrieverMilvus.image.repository }}:{{ .Values.retrieverMilvus.image.tag }}"
        imagePullPolicy: {{ .Values.retrieverMilvus.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.servicePorts.retriever }}
        env:
        - name: RETRIEVER_BACKEND
          value: "milvus"
        - name: MILVUS_URI
          value: "http://{{ .Values.MILVUS_HOST }}:{{ .Values.MILVUS_PORT }}"
        - name: EMBEDDING_MODEL_NAME
          value: {{ required "Value for `global.EMBEDDING_MODEL_NAME` is required!" .Values.global.EMBEDDING_MODEL_NAME | quote }}
        - name: EMBEDDINGS_ENDPOINT
          value: "{{ .Values.multimodalembeddingServing.env.EMBEDDING_BASE_URL }}/embeddings"
        - name: INDEX_NAME
          value: {{ .Values.retrieverMilvus.env.INDEX_NAME | quote }}
        - name: MILVUS_METADATA_FIELD
          value: {{ .Values.retrieverMilvus.env.MILVUS_METADATA_FIELD | quote }}
        - name: DEFAULT_TOP_K
          value: {{ .Values.retrieverMilvus.env.DEFAULT_TOP_K | quote }}
        - name: MAX_TOP_K
          value: {{ .Values.retrieverMilvus.env.MAX_TOP_K | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.retrieverMilvus.env.LOG_LEVEL | quote }}
        - name: HF_ENDPOINT
          value: {{ .Values.retrieverMilvus.env.HF_ENDPOINT | quote }}
        - name: no_proxy
          value: "{{ .Values.global.proxy.no_proxy }},localhost,127.0.0.1,.svc.cluster.local"
        - name: http_proxy
          value: {{ .Values.global.proxy.http_proxy | quote }}
        - name: https_proxy
          value: {{ .Values.global.proxy.https_proxy | quote }}
        - name: NO_PROXY
          value: "{{ .Values.global.proxy.no_proxy }},localhost,127.0.0.1,.svc.cluster.local"
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.servicePorts.retriever }}
          {{- with .Values.retrieverMilvus.livenessProbe }}
          initialDelaySeconds: {{ .initialDelaySeconds }}
          periodSeconds: {{ .periodSeconds }}
          timeoutSeconds: {{ .timeoutSeconds }}
          failureThreshold: {{ .failureThreshold }}
          {{- end }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.servicePorts.retriever }}
          {{- with .Values.retrieverMilvus.readinessProbe }}
          initialDelaySeconds: {{ .initialDelaySeconds }}
          periodSeconds: {{ .periodSeconds }}
          timeoutSeconds: {{ .timeoutSeconds }}
          failureThreshold: {{ .failureThreshold }}
          {{- end }}

